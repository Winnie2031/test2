<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>餐廳詳細資訊</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f9f9f9;
    }

    h1 {
      color: #ff5722;
      margin-bottom: 12px;
    }

    #image {
      width: 100%;
      max-width: 700px;
      height: 360px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: block;
    }

    #thumbs {
      max-width: 700px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .thumb {
      width: 120px;
      height: 84px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      opacity: 0.9;
      transition: transform 0.12s ease, opacity 0.12s ease;
      border: 2px solid transparent;
    }

    .thumb:hover {
      transform: translateY(-2px);
      opacity: 1;
    }

    .thumb.active {
      border-color: #ff5722;
      opacity: 1;
    }

    .info {
      margin-top: 20px;
      background: #fff;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      max-width: 700px;
    }

    .info p {
      margin: 6px 0;
      font-size: 1rem;
      line-height: 1.4;
    }

    .open-status {
      font-weight: bold;
    }

    .open-status.open {
      color: #1f9d55;
    }

    .open-status.closed {
      color: #e3342f;
    }

    .open-status.unknown {
      color: #666;
    }

    a {
      color: #ff5722;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1 id="name">載入中...</h1>

  <img id="image" src="https://via.placeholder.com/700x360?text=Loading" alt="餐廳圖片" />
  <div id="thumbs"></div>

  <div class="info" id="details"></div>

  <script>
    const priceMap = {
      1: "NT$100~200",
      2: "NT$200~400",
      3: "NT$400~600",
      4: "NT$600以上"
    };

    const statusMap = {
      OPERATIONAL: "正常營業",
      CLOSED_TEMPORARILY: "暫時停業",
      CLOSED_PERMANENTLY: "永久停業"
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const imgEl = document.getElementById("image");
    const thumbsEl = document.getElementById("thumbs");
    const detailsEl = document.getElementById("details");

    function proxyPhoto(ref, w = 1000) {
      return `/api/photo/${encodeURIComponent(ref)}?maxwidth=${encodeURIComponent(w)}`;
    }

    function setMainPhoto(ref) {
      if (ref) {
        imgEl.src = proxyPhoto(ref, 1200);
      } else {
        imgEl.src = "https://via.placeholder.com/700x360?text=No+Photo";
      }
    }

    imgEl.onerror = () => {
      imgEl.onerror = null;
      imgEl.src = "https://via.placeholder.com/700x360?text=No+Photo";
    };

    function renderPhotos(photos) {
      thumbsEl.innerHTML = "";

      if (!Array.isArray(photos) || photos.length === 0) {
        setMainPhoto(null);
        return;
      }

      setMainPhoto(photos[0].photo_reference);

      photos.forEach((p, idx) => {
        const ref = p.photo_reference;
        if (!ref) return;

        const t = document.createElement("img");
        t.className = "thumb" + (idx === 0 ? " active" : "");
        t.src = proxyPhoto(ref, 240);
        t.alt = "縮圖";
        t.loading = "lazy";

        t.onerror = () => {
          t.onerror = null;
          t.remove();
        };

        t.onclick = () => {
          setMainPhoto(ref);
          document.querySelectorAll(".thumb").forEach(el => {
            el.classList.remove("active");
          });
          t.classList.add("active");
        };

        thumbsEl.appendChild(t);
      });
    }

    // =====================
    // 即時營業時間判斷
    // =====================
    function timeToMinutes(timeStr) {
      if (!timeStr) return null;

      const hour = parseInt(timeStr.slice(0, 2), 10);
      const minute = parseInt(timeStr.slice(2, 4), 10);

      return hour * 60 + minute;
    }

    function isOpenNow(openingHoursJson) {
      if (!openingHoursJson) return null;

      let data;

      try {
        data =
          typeof openingHoursJson === "string"
            ? JSON.parse(openingHoursJson)
            : openingHoursJson;
      } catch (err) {
        console.error("opening_hours_json 解析失敗：", err);
        return null;
      }

      if (!data.periods || !Array.isArray(data.periods)) {
        return null;
      }

      const now = new Date();

      // 台灣時間
      const taiwanNow = new Date(
        now.toLocaleString("en-US", { timeZone: "Asia/Taipei" })
      );

      const today = taiwanNow.getDay();
      const nowMinutes = taiwanNow.getHours() * 60 + taiwanNow.getMinutes();

      // 判斷今天開、今天關
      for (const period of data.periods) {
        if (!period.open) continue;
        if (period.open.day !== today) continue;

        const openMinutes = timeToMinutes(period.open.time);
        if (openMinutes === null) continue;

        // 24 小時營業可能沒有 close
        if (!period.close) {
          return true;
        }

        const closeMinutes = timeToMinutes(period.close.time);
        const closeDay = period.close.day;

        if (closeMinutes === null) continue;

        // 同一天，例如 09:00 - 13:00
        if (closeDay === today) {
          if (nowMinutes >= openMinutes && nowMinutes < closeMinutes) {
            return true;
          }
        }

        // 跨日，例如 今天 18:00 - 明天 02:00
        if (closeDay !== today) {
          if (nowMinutes >= openMinutes) {
            return true;
          }
        }
      }

      // 判斷昨天開、今天凌晨關
      const yesterday = (today + 6) % 7;

      for (const period of data.periods) {
        if (!period.open || !period.close) continue;

        if (period.open.day === yesterday && period.close.day === today) {
          const closeMinutes = timeToMinutes(period.close.time);

          if (closeMinutes !== null && nowMinutes < closeMinutes) {
            return true;
          }
        }
      }

      return false;
    }

    function getOpenStatusHtml(store) {
      const openStatus = isOpenNow(store.opening_hours_json);

      if (openStatus === true) {
        return `<p class="open-status open">商家狀態: 🟢 營業中</p>`;
      }

      if (openStatus === false) {
        return `<p class="open-status closed">商家狀態: 🔴 休息中</p>`;
      }

      return `<p class="open-status unknown">商家狀態: ⚪ 營業時間未知</p>`;
    }

    function renderStore(store) {
      document.getElementById("name").textContent = store.name || "無名稱";
      imgEl.alt = store.name || "餐廳圖片";

      renderPhotos(store.photos);

      const html = `
        ${store.address ? `<p>📍 地址: ${store.address}</p>` : ""}
        ${store.phone ? `<p>📞 電話: ${store.phone}</p>` : ""}

        ${
          store.rating != null
            ? `<p>⭐ 評分: ${store.rating} (${store.user_ratings_total || 0}人評分)</p>`
            : ""
        }

        ${
          store.price_level != null
            ? `<p>💲 價位: ${priceMap[store.price_level] || store.price_level}</p>`
            : ""
        }

        ${getOpenStatusHtml(store)}

        ${
          store.business_status
            ? `<p>Google 商家狀態: ${statusMap[store.business_status] || store.business_status}</p>`
            : ""
        }

        <p>外送: ${store.delivery ? "✅ 可" : "❌ 不可"}</p>
        <p>內用: ${store.dine_in ? "✅ 可" : "❌ 不可"}</p>
        <p>外帶: ${store.takeout ? "✅ 可" : "❌ 不可"}</p>
        <p>可預約: ${store.reservable ? "✅ 可" : "❌ 不可"}</p>
        <p>無障礙入口: ${store.wheelchair_accessible_entrance ? "✅ 有" : "❌ 無"}</p>

        ${store.details_fetched_at ? `<p>資料更新時間: ${store.details_fetched_at}</p>` : ""}
        ${store.google_maps_url ? `<p>🌐 <a href="${store.google_maps_url}" target="_blank">Google 地圖</a></p>` : ""}
        ${store.website ? `<p>🔗 <a href="${store.website}" target="_blank">官方網站</a></p>` : ""}
      `;

      detailsEl.innerHTML = html;
    }

    if (!id) {
      detailsEl.innerHTML = "<p>找不到餐廳 ID</p>";
      setMainPhoto(null);
    } else {
      fetch(`/api/restaurants/${id}`)
        .then(res => res.json())
        .then(payload => {
          if (!payload.ok || !payload.data) {
            detailsEl.innerHTML = "<p>找不到餐廳資料</p>";
            setMainPhoto(null);
            return;
          }

          const store = payload.data;

          console.log("opening_hours_json:", store.opening_hours_json);

          renderStore(store);

          // 每 1 分鐘重新判斷一次營業狀態
          setInterval(() => {
            renderStore(store);
          }, 60000);
        })
        .catch(err => {
          console.error("抓資料失敗", err);
          detailsEl.innerHTML = "<p>抓取資料失敗</p>";
          setMainPhoto(null);
        });
    }
  </script>

</body>
</html>
