<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>食在中原</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      text-align: center;
      background-color: #f9f9f9;
    }

    .login-icon {
      position: fixed;
      top: 24px;
      right: 28px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #fff;
      color: #8b6f6f;
      border: 2px solid #d6caca;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      transition: transform 0.15s ease;
    }

    .login-icon:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: 3rem;
      color: #ff5722;
      margin-bottom: -10px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 20px;
    }

    .search-input {
      width: 300px;
      padding: 12px 20px;
      border-radius: 50px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .divider {
      height: 4px;
      background: #eee;
      margin: 20px 0;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      padding: 16px;
    }

    .card {
      position: relative;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-info {
      padding: 10px;
      padding-bottom: 42px;
      text-align: left;
    }

    .card-info h3 {
      margin: 6px 0;
      font-size: 1.1rem;
    }

    .card-info p {
      margin: 4px 0;
      font-size: 0.9rem;
      color: #555;
    }

    .heart {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      cursor: pointer;
      z-index: 5;
    }

    .distance-badge {
      position: absolute;
      left: 12px;
      bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      color: #333;
      z-index: 9;
      user-select: none;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }

    #aiBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #ff5722;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 999;
    }

    #aiChat {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 300px;
      max-height: 400px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      padding: 10px;
      overflow-y: auto;
      display: none;
      z-index: 999;
    }

    #aiChat textarea {
      width: 100%;
      height: 60px;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 6px;
      box-sizing: border-box;
    }

    #aiChat button {
      padding: 6px 12px;
      border: none;
      background-color: #ff5722;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }

    #aiOutput {
      text-align: left;
      margin-top: 8px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <!-- 右上角登入圖示 -->
  <div class="login-icon" id="loginIcon" title="登入">👤</div>

  <h1>食在中原</h1>
  <p class="subtitle">關於中原附近的美食餐廳</p>

  <input
    id="search"
    class="search-input"
    placeholder="搜尋餐廳名稱或地址..."
  />

  <div class="divider"></div>

  <div id="cards" class="card-container"></div>

  <div class="ai-box">
    <h3>🤖 GPT 推薦餐廳</h3>
    <input id="gptInput" placeholder="例如：便宜、近、現在有開的店">
    <button onclick="askGPT()">推薦</button>
    <div id="gptResult"></div>
  </div>

  <button id="aiBtn">🤖</button>

  <div id="aiChat">
    <textarea id="aiInput" placeholder="問我餐廳建議..."></textarea>
    <button id="aiSend">送出</button>
    <div id="aiOutput"></div>
  </div>

  <script src="app.js"></script>

  <script>
    const loginIcon = document.getElementById("loginIcon");
    const token = localStorage.getItem("token");

    if (token) {
      loginIcon.textContent = "✅";
      loginIcon.title = "已登入，點擊可登出";

      loginIcon.onclick = () => {
        if (confirm("確定要登出嗎？")) {
          localStorage.removeItem("token");
          location.reload();
        }
      };
    } else {
      loginIcon.textContent = "👤";
      loginIcon.title = "登入";

      loginIcon.onclick = () => {
        location.href = "login.html";
      };
    }
  </script>

</body>
</html>
